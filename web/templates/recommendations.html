{% extends "base.html" %}

{% block title %}Recommendations - Istanbul Guide{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-10 mx-auto">
        <h2 class="text-white text-center mb-4">
            <i class="fas fa-star me-2"></i>Get Personalized Recommendations
        </h2>

        <div class="card">
            <div class="card-body">
                <form id="recommendationForm">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label for="interests" class="form-label">Interests</label>
                            <input type="text" class="form-control" id="interests"
                                   placeholder="history, culture, food" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">&nbsp;</label>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search me-1"></i>Get Recommendations
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div id="results" class="mt-4" style="display: none;">
            <h4 class="text-white mb-3">
                <i class="fas fa-list me-2"></i>Your Recommendations
            </h4>
            <div id="recommendationsList" class="row g-4">
                <!-- Recommendations will be inserted here -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('recommendationForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const interests = document.getElementById('interests').value.split(',').map(i => i.trim());

    try {
        const response = await fetch('/api/recommend', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ interests: interests })
        });

        const data = await response.json();

        if (data.success) {
            displayRecommendations(data.recommendations);
        } else {
            alert('Error getting recommendations');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error getting recommendations');
    }
});

function displayRecommendations(recommendations) {
    const container = document.getElementById('recommendationsList');
    container.innerHTML = '';

    recommendations.forEach(rec => {
        const card = `
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-map-marker-alt text-primary me-2"></i>
                            ${rec.name}
                        </h5>
                        <p class="card-text">
                            <span class="badge bg-secondary me-2">${rec.category}</span>
                            <span class="badge bg-info">Score: ${rec.hybrid_score.toFixed(3)}</span>
                        </p>
                        <p class="card-text">${rec.explanation}</p>
                        <button class="btn btn-sm btn-outline-primary rate-btn"
                                data-place="${rec.name}">
                            <i class="fas fa-star me-1"></i>Rate This Place
                        </button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });

    document.getElementById('results').style.display = 'block';

    // Add event listeners for rating buttons
    document.querySelectorAll('.rate-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const placeName = this.getAttribute('data-place');
            const rating = prompt(`Rate ${placeName} (1-5 stars):`);
            if (rating && rating >= 1 && rating <= 5) {
                ratePlace(placeName, parseFloat(rating));
            }
        });
    });
}

async function ratePlace(placeName, rating) {
    try {
        const response = await fetch('/api/rate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ place_name: placeName, rating: rating })
        });

        const data = await response.json();
        alert(data.message);
    } catch (error) {
        console.error('Error:', error);
        alert('Error rating place');
    }
}
</script>
{% endblock %}
